<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — Page Not Found | CppLearn</title>
<meta http-equiv="refresh" content="0; url=/" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Sora',sans-serif;
    background:#0a0e1a;
    color:#e8eeff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }
  .wrap{max-width:480px}
  .code{
    font-family:'JetBrains Mono',monospace;
    font-size:96px;
    font-weight:700;
    background:linear-gradient(135deg,#4f7cff,#a259ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1;
    margin-bottom:16px;
  }
  h1{font-size:24px;font-weight:700;margin-bottom:10px}
  p{color:#8892b0;font-size:15px;line-height:1.7;margin-bottom:28px}
  a{
    display:inline-block;
    background:linear-gradient(135deg,#4f7cff,#a259ff);
    color:#fff;
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:12px 28px;
    border-radius:9px;
    text-decoration:none;
    transition:.2s;
  }
  a:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(79,124,255,0.4)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. You'll be redirected to the home page automatically.</p>
    <a href="/">← Back to CppLearn</a>
  </div>
</body>
</html>
